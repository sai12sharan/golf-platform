services:
  - type: web
    name: golf-platform-frontend
    env: node
    plan: free
    buildCommand: cd client/golf-client && npm ci && npm run build
    startCommand: cd client/golf-client && npm start
    
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://your-username-golf-platform-backend.hf.space
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "18"
    
    routes:
      - path: /
        destination: http://localhost:3000

  - type: web
    name: golf-platform-backend
    env: node
    plan: free
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://golf-platform-frontend.onrender.com
      - key: NODE_VERSION
        value: "18"
    
    routes:
      - path: /api
        destination: http://localhost:5000
